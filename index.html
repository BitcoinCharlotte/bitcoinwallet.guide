<style>
/* === Reset & Base === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #F7931A;
  --orange-dim: #c47515;
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2129;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #e3b341;
  --radius: 10px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

a { color: var(--orange); text-decoration: none; }
a:hover { text-decoration: underline; }

/* === Layout === */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}

/* === Header === */
.header {
  text-align: center;
  padding: 30px 0 20px;
}
.header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--orange);
  margin-bottom: 6px;
}
.header h1 span { color: var(--text); }
.header p {
  color: var(--text-dim);
  font-size: 0.95rem;
}

/* === Builder Mode === */
.welcome-input {
  margin: 20px 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.welcome-input label {
  display: block;
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 0.9rem;
  color: var(--text-dim);
}
.welcome-input textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 10px 12px;
  font-family: inherit;
  font-size: 0.95rem;
  resize: vertical;
  min-height: 60px;
}
.welcome-input textarea:focus {
  outline: none;
  border-color: var(--orange);
}

/* === Section === */
.section-title {
  font-size: 1.1rem;
  font-weight: 700;
  margin: 28px 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* === Wallet Card (Builder) === */
.wallet-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
@media (min-width: 600px) {
  .wallet-grid { grid-template-columns: 1fr 1fr; }
}

.wallet-card {
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
  position: relative;
}
.wallet-card:hover { border-color: var(--orange-dim); background: var(--bg3); }
.wallet-card.selected { border-color: var(--orange); background: rgba(247,147,26,0.08); }
.wallet-card.flagged {
  border-color: var(--red);
  background: rgba(248,81,73,0.08);
  opacity: 0.55;
}
.wallet-card.flagged:hover { opacity: 1; }
.wallet-card.flagged.selected { opacity: 1; border-color: var(--red); background: rgba(248,81,73,0.14); }
.wallet-card.flagged .wname::after {
  content: '⚠';
  margin-left: 6px;
  color: var(--red);
  font-size: 0.85em;
  vertical-align: 1px;
}
.wallet-card.cautioned {
  border-color: var(--yellow);
  background: rgba(227,179,65,0.07);
  opacity: 0.75;
}
.wallet-card.cautioned:hover { opacity: 1; }
.wallet-card.cautioned.selected { opacity: 1; border-color: var(--yellow); background: rgba(227,179,65,0.14); }
.wallet-card.cautioned .wname::after {
  content: '⚠';
  margin-left: 6px;
  color: var(--yellow);
  font-size: 0.85em;
  vertical-align: 1px;
}
.wallet-card .check {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}
.wallet-card.selected .check {
  background: var(--orange);
  border-color: var(--orange);
  color: #000;
}

/* === Wallet Icon === */
.wallet-card-inner {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.wallet-icon {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  flex-shrink: 0;
  object-fit: contain;
}
.wallet-icon-lg {
  width: 52px;
  height: 52px;
  border-radius: 10px;
}
.wallet-card-text {
  flex: 1;
  min-width: 0;
}

.wallet-card .wname {
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: 4px;
  padding-right: 30px;
}
.wallet-card .wdesc {
  font-size: 0.82rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  line-height: 1.4;
}
.wallet-card .wmeta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  font-size: 0.75rem;
}

/* === Badges === */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.lucide { width: 14px; height: 14px; flex-shrink: 0; vertical-align: -2px; display: inline-block; }
.badge .lucide { width: 13px; height: 13px; flex-shrink: 0; }
.filter-pill .lucide { width: 14px; height: 14px; flex-shrink: 0; vertical-align: -2px; }
.download-btn .lucide { width: 14px; height: 14px; flex-shrink: 0; vertical-align: -2px; }
.badge-lightning { background: rgba(255,210,63,0.15); color: #ffd23f; }
.badge-onchain { background: rgba(247,147,26,0.15); color: var(--orange); }
.badge-hardware { background: rgba(139,148,158,0.2); color: #c9d1d9; }
.badge-multisig { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-exchange { background: rgba(59,130,246,0.15); color: #3b82f6; }
.badge-ecash { background: rgba(168,85,247,0.15); color: #a855f7; }
.badge-privacy { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-custodial { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-self { background: rgba(63,185,80,0.1); color: var(--green); }
.badge-community { background: rgba(168,85,247,0.15); color: #a855f7; }
.badge-platform { background: rgba(139,148,158,0.12); color: var(--text-dim); }
.badge-not-btc-only {
  background: rgba(248,81,73,0.15);
  color: var(--red);
  border: 1px solid rgba(248,81,73,0.3);
}

/* === Generate Area === */
.generate-area {
  margin-top: 30px;
  text-align: center;
}
.btn {
  display: inline-block;
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.15s;
  font-family: inherit;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--orange);
  color: #000;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-secondary {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
}

.output-area {
  margin-top: 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: none;
}
.output-area.visible { display: block; }

.url-display {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  word-break: break-all;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.8rem;
  color: var(--orange);
  margin-bottom: 12px;
}

.url-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.qr-container {
  display: flex;
  justify-content: center;
  padding: 16px;
  background: #fff;
  border-radius: 8px;
  width: fit-content;
  margin: 0 auto;
}

.char-count {
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-top: 8px;
}
.char-count.warn { color: var(--red); }

/* === Landing Mode === */
.landing-welcome {
  text-align: center;
  margin: 10px 0 30px;
  padding: 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.landing-welcome p {
  font-size: 1.1rem;
  white-space: pre-wrap;
}

.landing-wallet {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
}
.landing-wallet .wname {
  font-weight: 700;
  font-size: 1.15rem;
  margin-bottom: 4px;
}
.landing-wallet .wdesc {
  color: var(--text-dim);
  font-size: 0.9rem;
  margin-bottom: 10px;
}
.landing-wallet .wmeta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
  font-size: 0.75rem;
}
.landing-wallet .download-links {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.download-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 600;
  transition: border-color 0.15s;
}
.download-btn:hover {
  border-color: var(--orange);
  text-decoration: none;
}

.landing-footer {
  text-align: center;
  margin: 36px 0 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.landing-footer a {
  font-size: 0.95rem;
}

/* === Why We Built It === */
.why-section {
  margin: 40px 0 20px;
  padding: 24px 28px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--orange);
  border-radius: var(--radius);
}
.why-section h2 {
  margin: 0 0 12px;
  font-size: 1.1rem;
  color: var(--text);
  font-weight: 600;
}
.why-section p {
  margin: 0 0 10px;
  color: var(--text-dim);
  font-size: 0.95rem;
  line-height: 1.55;
}
.why-section p:last-child { margin-bottom: 0; }
.why-section .why-meta {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: 0.8rem;
  color: var(--text-dim);
}
.why-section .why-meta a {
  color: var(--orange);
  text-decoration: none;
}
.why-section .why-meta a:hover { text-decoration: underline; }

/* === Selection Counter === */
.selection-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 0 -16px;
  padding: 10px 16px;
}
.selection-count {
  font-size: 0.85rem;
  color: var(--text-dim);
}
.selection-count strong {
  color: var(--orange);
}

/* === Toast === */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green);
  color: #000;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.9rem;
  transition: transform 0.3s ease;
  z-index: 999;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* === Site Footer === */
.site-footer {
  border-top: 1px solid var(--border);
  background: var(--bg2);
  margin-top: 60px;
  padding: 32px 20px;
  text-align: center;
}
.footer-inner {
  max-width: 760px;
  margin: 0 auto;
}
.footer-inner p {
  color: var(--text-dim);
  font-size: 0.875rem;
  line-height: 1.6;
  margin: 0;
}
.footer-inner p + p { margin-top: 10px; }
.footer-disclaimer {
  font-size: 0.75rem !important;
  opacity: 0.7;
}
.site-footer a {
  color: var(--orange);
  text-decoration: none;
  font-weight: 500;
}
.site-footer a:hover { text-decoration: underline; }
.footer-version {
  margin-top: 14px !important;
  font-size: 0.7rem !important;
  opacity: 0.55;
  font-family: 'SF Mono', Menlo, Consolas, monospace;
  letter-spacing: 0.02em;
}
.footer-version a {
  color: var(--text-dim) !important;
  font-weight: 400 !important;
}

/* === Filter Pills === */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 16px 0;
}
.filter-pill {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--bg2);
  color: var(--text-dim);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-pill:hover {
  border-color: var(--orange-dim);
  color: var(--text);
}
.filter-pill.active {
  background: var(--orange);
  border-color: var(--orange);
  color: #000;
}
</style>

        <span id="version-commit">···</span>
      </a>
    </p>

<script>
// Footer: load build version (commit hash + date) from version.json
(async () => {
  try {
    const r = await fetch('version.json', { cache: 'no-store' });
    if (!r.ok) return;
    const v = await r.json();
    if (!v.commit) return;
    const el = document.getElementById('version-commit');
    const link = document.getElementById('version-link');
    const d = v.date ? new Date(v.date) : null;
    const ds = d && !isNaN(d) ? d.toISOString().slice(0, 10) : '';
    el.textContent = ds ? `${v.commit} · ${ds}` : v.commit;
    link.href = `https://github.com/BitcoinCharlotte/bitcoinwallet.guide/commit/${v.commit}`;
    link.title = `View commit ${v.commit} on GitHub`;
  } catch (_) { /* silent — footer just won't show version */ }
})();
</script>

// === QR Code Generator (using Nayuki's qrcodegen library, MIT licensed) ===
// Library: lib/qrcodegen.min.js — supports QR versions 1-40 (up to ~2.9KB byte mode).
// API: qrcodegen.QrCode.encodeText(text, errCorLvl)
// We expose a `QR.toSVG(text, ecl, moduleSize, quietZone)` shim so existing call sites stay unchanged.
const QR = (() => {
  const ECL_MAP = {
    'L': qrcodegen.QrCode.Ecc.LOW,
    'M': qrcodegen.QrCode.Ecc.MEDIUM,
    'Q': qrcodegen.QrCode.Ecc.QUARTILE,
    'H': qrcodegen.QrCode.Ecc.HIGH
  };

  // Build an SVG matching the previous output shape so existing CSS/sizing keeps working.
  function toSVG(text, ecl = 'L', moduleSize = 3, quietZone = 4) {
    let qr;
    try {
      qr = qrcodegen.QrCode.encodeText(text, ECL_MAP[ecl] || ECL_MAP['L']);
    } catch (e) {
      // qrcodegen throws when data exceeds version 40 capacity (~2.9KB byte mode).
      return '<p style="color:red">URL too long for QR code</p>';
    }
    const size = qr.size;
    const svgSize = (size + quietZone * 2) * moduleSize;
    let paths = '';
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        if (qr.getModule(x, y)) {
          const px = (x + quietZone) * moduleSize;
          const py = (y + quietZone) * moduleSize;
          paths += `M${px},${py}h${moduleSize}v${moduleSize}h-${moduleSize}z`;
        }
      }
    }
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${svgSize} ${svgSize}" width="${svgSize}" height="${svgSize}" style="max-width:100%;height:auto;">` +
      `<rect width="100%" height="100%" fill="#fff"/>` +
      `<path d="${paths}" fill="#000"/>` +
      `</svg>`;
  }

  return { toSVG };
})();

async function parseHash() {
  const hash = location.hash.slice(1);
  if (!hash) return null;
  const params = new URLSearchParams(hash);
  const w = params.get('w');
  if (!w) return null;
  const c = params.get('c');
  const t = params.get('t');
  let welcomeText = '';
  if (c) {
    welcomeText = await decompressText(c);
  } else if (t) {
    welcomeText = safeAtob(t);
  }
  return {
    walletIds: w.split(',').filter(Boolean),
    welcomeText
  };
}

function safeAtob(str) {
  try { return decodeURIComponent(escape(atob(str))); } catch { return ''; }
}
function safeBtoa(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

// === Compression (deflate-raw via CompressionStream/DecompressionStream) ===
function toBase64url(bytes) {
  let s = '';
  for (const b of bytes) s += String.fromCharCode(b);
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function fromBase64url(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  const bin = atob(str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function compressText(text) {
  if (typeof CompressionStream === 'undefined') return null;
  try {
    const encoded = new TextEncoder().encode(text);
    const cs = new CompressionStream('deflate-raw');
    const writer = cs.writable.getWriter();
    writer.write(encoded);
    writer.close();
    const reader = cs.readable.getReader();
    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    let totalLen = 0;
    for (const c of chunks) totalLen += c.length;
    const result = new Uint8Array(totalLen);
    let offset = 0;
    for (const c of chunks) { result.set(c, offset); offset += c.length; }
    return toBase64url(result);
  } catch { return null; }
}

async function decompressText(b64) {
  if (typeof DecompressionStream === 'undefined') return '';
  try {
    const bytes = fromBase64url(b64);
    const ds = new DecompressionStream('deflate-raw');
    const writer = ds.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const reader = ds.readable.getReader();
    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    let totalLen = 0;
    for (const c of chunks) totalLen += c.length;
    const result = new Uint8Array(totalLen);
    let offset = 0;
    for (const c of chunks) { result.set(c, offset); offset += c.length; }
    return new TextDecoder().decode(result);
  } catch { return ''; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderBadges(wallet) {
  let html = '';
  // 🚩 Lead with the warning — red "Not Bitcoin-only" badge whenever the wallet supports non-BTC assets,
  // regardless of caution tier. Caution tier changes the card chrome (yellow border) but not the badge.
  if (wallet.notBitcoinOnly || wallet.caution) {
    html += `<span class="badge badge-not-btc-only">${icon('triangle-alert')} Not Bitcoin-only</span>`;
  }
  for (const cat of wallet.categories) {
    const info = CATEGORY_LABELS[cat];
    if (info) html += `<span class="badge ${info.cls}">${icon(info.icon)} ${info.label}</span>`;
  }
  if (wallet.custody === 'custodial') {
    html += `<span class="badge badge-custodial">${icon('landmark')} Custodial</span>`;
  } else if (wallet.custody === 'community') {
    html += `<span class="badge badge-community">${icon('users')} Community custody</span>`;
  } else {
    html += `<span class="badge badge-self">${icon('key')} Self-custody</span>`;
  }
  for (const p of wallet.platforms) {
    // 'hardware' is already shown via the category badge — don't duplicate as a platform tag.
    if (p === 'hardware') continue;
    html += `<span class="badge badge-platform">${icon(PLATFORM_ICONS[p])} ${PLATFORM_LABELS[p] || p}</span>`;
  }
  return html;
}

let activeFilters = new Set(['all']);

function getWalletFilterTags(w) {
  const tags = new Set();
  for (const cat of w.categories) tags.add(cat);
  for (const p of w.platforms) tags.add(p);
  // Synthesize a `not-bitcoin-only` tag for filtering: include wallets flagged as supporting altcoins.
  if (w.notBitcoinOnly) tags.add('not-bitcoin-only');
  return tags;
}

function walletMatchesFilters(w) {
  if (activeFilters.has('all')) return true;
  const tags = getWalletFilterTags(w);
  // Also add custody type as a filterable tag
  tags.add(w.custody);
  for (const f of activeFilters) {
    if (tags.has(f)) return true;
  }
  return false;
}

function toggleFilter(filter) {
  if (filter === 'all') {
    activeFilters.clear();
    activeFilters.add('all');
  } else {
    activeFilters.delete('all');
    if (activeFilters.has(filter)) {
      activeFilters.delete(filter);
      if (activeFilters.size === 0) activeFilters.add('all');
    } else {
      activeFilters.add(filter);
    }
  }
  updateFiltersAndGrid();
}

function renderFilterPills() {
  const filters = [
    { id: 'all', label: 'All' },
    { id: 'lightning', label: `${icon('zap')} Lightning` },
    { id: 'onchain', label: `${icon('link')} On-chain` },
    { id: 'hardware', label: `${icon('cpu')} Hardware` },
    { id: 'multisig', label: `${icon('shield-check')} Multi-sig` },
    { id: 'exchange', label: `${icon('arrow-left-right')} Exchange` },
    { id: 'ecash', label: `${icon('users')} eCash` },
    { id: 'self-custodial', label: `${icon('key')} Self-custody` },
    { id: 'custodial', label: `${icon('landmark')} Custodial` },
    { id: 'not-bitcoin-only', label: `${icon('alert-triangle')} Not Bitcoin-only` },
    { id: 'ios', label: `${icon('smartphone')} iOS` },
    { id: 'android', label: `${icon('smartphone')} Android` },
    { id: 'desktop', label: `${icon('monitor')} Desktop` },
    { id: 'web', label: `${icon('globe')} Web` },
  ];
  return filters.map(f =>
    `<button class="filter-pill${activeFilters.has(f.id) ? ' active' : ''}" onclick="toggleFilter('${f.id}')">${f.label}</button>`
  ).join('');
}

function renderWalletGrid() {
  let html = '<div class="wallet-grid">';
  // Sort order: clean (0) → cautioned (1) → flagged (2). Preserves original order within each group.
  const tier = w => w.notBitcoinOnly ? 2 : (w.caution ? 1 : 0);
  const ordered = WALLETS.slice().sort((a, b) => tier(a) - tier(b));
  for (const w of ordered) {
    if (!walletMatchesFilters(w)) continue;
    const sel = selected.has(w.id) ? ' selected' : '';
    const flag = w.notBitcoinOnly ? ' flagged' : (w.caution ? ' cautioned' : '');
    html += `
      <div class="wallet-card${sel}${flag}" data-id="${w.id}" onclick="toggleWallet('${w.id}')">
        <div class="check">${selected.has(w.id) ? '✓' : ''}</div>
        <div class="wallet-card-inner">
          ${w.icon ? `<img class="wallet-icon" src="${w.icon}" alt="${w.name}" loading="lazy">` : ''}
          <div class="wallet-card-text">
            <div class="wname">${w.name}</div>
            <div class="wdesc">${w.description}</div>
            <div class="wmeta">${renderBadges(w)}</div>
          </div>
        </div>
      </div>`;
  }
  html += '</div>';
  return html;
}

function updateFiltersAndGrid() {
  const filtersEl = document.getElementById('filter-bar');
  const gridEl = document.getElementById('wallet-grid-container');
  if (filtersEl) filtersEl.innerHTML = renderFilterPills();
  if (gridEl) gridEl.innerHTML = renderWalletGrid();
}

function toggleWallet(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);

  const card = document.querySelector(`.wallet-card[data-id="${id}"]`);
  if (card) {
    card.classList.toggle('selected');
    card.querySelector('.check').textContent = selected.has(id) ? '✓' : '';
  }
  updateCount();

  const output = document.getElementById('output-area');
  if (output && output.classList.contains('visible')) generateLink();
}

function updateCount() {
  const el = document.getElementById('sel-count');
  const btn = document.getElementById('gen-btn');
  if (el) el.textContent = selected.size;
  if (btn) btn.disabled = selected.size === 0;
}

function updateCharCount() {
  const textarea = document.getElementById('welcome-text');
  const counter = document.getElementById('char-counter');
  if (!textarea || !counter) return;
  const len = textarea.value.length;
  counter.textContent = `${len.toLocaleString()} / 500`;
  counter.style.color = len > 450 ? 'var(--red)' : len > 400 ? 'var(--orange)' : 'var(--text-dim)';
}

let generatedUrl = '';

async function generateLink() {
  const text = document.getElementById('welcome-text').value.trim();
  const walletParam = Array.from(selected).join(',');
  let fragment = `w=${walletParam}`;
  if (text) {
    const compressed = await compressText(text);
    const fallback = safeBtoa(text);
    if (compressed && compressed.length < fallback.length) {
      fragment += `&c=${compressed}`;
    } else {
      fragment += `&t=${fallback}`;
    }
  }

  const baseUrl = location.origin + location.pathname;
  generatedUrl = `${baseUrl}#${fragment}`;

  const output = document.getElementById('output-area');
  const urlDisplay = document.getElementById('url-display');
  const charCount = document.getElementById('char-count');
  const qrContainer = document.getElementById('qr-container');

  urlDisplay.textContent = generatedUrl;
  const len = generatedUrl.length;
  charCount.textContent = `${len} characters${len > 1000 ? ' ⚠️ URL may be too long for reliable QR scanning' : ''}`;
  charCount.className = `char-count${len > 1000 ? ' warn' : ''}`;

  qrContainer.innerHTML = QR.toSVG(generatedUrl, 'L', 3, 4);
  output.classList.add('visible');

  output.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyUrl() {
  navigator.clipboard.writeText(generatedUrl).then(() => showToast('Link copied!'));
}

function openPreview() {
  window.open(generatedUrl, '_blank');
}

function renderLanding(walletIds, welcomeText) {
  const wallets = walletIds.map(id => WALLET_MAP[id]).filter(Boolean);

  let html = `
    <div class="header">
      <h1><span><span style="color:var(--orange);">₿</span>itcoinWallet.Guide</span></h1>
    </div>
  `;

  if (welcomeText) {
    const links = extractLinks(welcomeText);
    const welcomeMargin = links.length > 0 ? 'margin-bottom:0;border-bottom-left-radius:0;border-bottom-right-radius:0;' : '';
    html += `<div class="landing-welcome" style="${welcomeMargin}"><p>${renderMarkdownLinks(welcomeText)}</p></div>`;

      html += `<div style="font-size:0.65rem;color:var(--text-dim);margin:-1px 0 20px;padding:4px 12px;text-align:center;">`;

      html += `</div>`;
    }
  }

  if (wallets.length === 0) {
    html += '<p style="text-align:center;color:var(--text-dim);padding:40px 0;">No valid wallets found in this link.</p>';
  }

  for (const w of wallets) {
    // Build download links for web platform
    let webLink = '';
    if (w.platforms.includes('web') && w.desktop) {
      webLink = `<a class="download-btn" href="${w.desktop}" target="_blank">${icon('globe')} Web</a>`;
    }

    html += `
      <div class="landing-wallet">
        <div class="wallet-card-inner">
          ${w.icon ? `<img class="wallet-icon wallet-icon-lg" src="${w.icon}" alt="${w.name}" loading="lazy">` : ''}
          <div class="wallet-card-text">
            <div class="wname">${w.name}</div>
            <div class="wdesc">${w.description}</div>
            <div class="wmeta">${renderBadges(w)}</div>
          </div>
        </div>
        <div class="download-links">
          ${w.appStore ? `<a class="download-btn" href="${w.appStore}" target="_blank">${icon('smartphone')} App Store</a>` : ''}
          ${w.playStore ? `<a class="download-btn" href="${w.playStore}" target="_blank">${icon('smartphone')} Google Play</a>` : ''}
          ${w.desktop && !w.platforms.includes('web') ? `<a class="download-btn" href="${w.desktop}" target="_blank">${icon('monitor')} Desktop</a>` : ''}
          ${webLink}
          ${w.buyUrl ? `<a class="download-btn" href="${w.buyUrl}" target="_blank">${icon('shopping-cart')} Buy</a>` : ''}
          <a class="download-btn" href="${w.url}" target="_blank">${icon('globe')} Website</a>
        </div>
      </div>`;
  }

  const currentUrl = location.href;
  html += `
    <div style="text-align:center;margin:30px 0 10px;padding:20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);">
      <div style="font-size:0.85rem;color:var(--text-dim);margin-bottom:12px;">${icon('smartphone')} Share this page — scan to open on another device</div>
      <div class="qr-container" id="landing-qr">${QR.toSVG(currentUrl, 'L', 3, 4)}</div>
      <div style="font-size:0.7rem;color:var(--text-dim);margin-top:8px;word-break:break-all;">${escapeHtml(currentUrl)}</div>
    </div>
    <div class="landing-footer">
      <a href="${location.pathname}">← Browse All Wallets &amp; Build Your Own List</a>
    </div>`;

  app.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderMarkdownLinks(text) {
  // Convert [text](url) to <a> tags, escape everything else
  const parts = text.split(/(\[[^\]]+\]\([^)]+\))/g);
  return parts.map(part => {
    const match = part.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
    if (match) return `<a href="${match[2]}" target="_blank">${match[1]}</a>`;
    const div = document.createElement('div');
    div.textContent = part;
    return div.innerHTML;
  }).join('');
}

function extractLinks(text) {
  const links = [];
  const regex = /\[([^\]]+)\]\(([^)]+)\)/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    links.push({ label: match[1], url: match[2] });
  }
  return links;
}


// === Router ===
async function route() {
  const params = await parseHash();
  if (params) {
    renderLanding(params.walletIds, params.welcomeText);
  } else {
    selected.clear();
    renderBuilder();
  }
}

window.addEventListener('hashchange', route);
route();
</script>
